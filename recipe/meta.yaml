{% set name = "quazip" %}
{% set version = "1.7.1" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/stachenov/quazip/archive/refs/tags/v{{ version }}.tar.gz
  sha256: e3c7220e66d9f8024ef4aa98befb2592fea219a01736a400b07b11aa60964d02

build:
  number: 0
  skip: true  # [win]
  run_exports:
    - {{ pin_subpackage('quazip', max_pin='x') }}

requirements:
  build:
    - cmake
    - make
    - {{ compiler('cxx') }}
    - {{ stdlib('c') }}
  host:
    - qt6-main
    - zlib

test:
  commands:
    - test -f $PREFIX/lib/libquazip1-qt6.so  # [linux]

about:
  home: https://stachenov.github.io/quazip/
  license: GPL-2.0-only
  license_family: GPL2
  license_file: COPYING
  summary: Qt/C++ wrapper over minizip

extra:
  recipe-maintainers:
    - izahn
    - effigies
